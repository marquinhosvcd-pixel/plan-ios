name: iOS — build & upload to App Store Connect

# Dispara manualmente (aba Actions → Run workflow) ou empurrando uma tag ios-v*
on:
  workflow_dispatch:
  push:
    tags:
      - 'ios-v*'

jobs:
  build:
    runs-on: macos-26            # macOS 26 (Tahoe) — Xcode 26.x default (exigido pela Apple desde 28/04/2026)
    timeout-minutes: 40
    env:
      WORKSPACE: ios/App/App.xcworkspace
      SCHEME: App
      BUNDLE_ID: br.com.planescala.app
      TEAM_ID: 7VJM86LHGV
      CONFIG: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mostrar Xcode em uso
        run: xcodebuild -version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências JS
        run: npm ci

      - name: Capacitor sync (copia www + gera Pods)
        run: npx cap sync ios

      - name: Gravar chave de API do App Store Connect
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPSTORE_API_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          # Path usado pelo xcodebuild (-authenticationKeyPath) e pelo altool (~/.appstoreconnect)
          echo "$APPSTORE_API_PRIVATE_KEY_BASE64" | base64 --decode -o "$RUNNER_TEMP/AuthKey.p8"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$RUNNER_TEMP/AuthKey.p8" "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8"

      - name: Archive (assinatura automática via chave de API)
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration "$CONFIG" \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_API_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            PROVISIONING_PROFILE="" \
            clean archive

      - name: Export IPA
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_API_ISSUER_ID"
          ls -la "$RUNNER_TEMP/export"

      - name: Upload para App Store Connect
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          IPA=$(ls "$RUNNER_TEMP/export"/*.ipa | head -1)
          echo "Enviando $IPA ..."
          xcrun altool --upload-app -t ios -f "$IPA" \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"

      - name: Guardar IPA como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: App-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: warn
